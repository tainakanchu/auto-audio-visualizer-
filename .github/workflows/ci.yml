name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

# 同一ブランチの連続 push では古い実行をキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type check & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # build スクリプトは `tsc -b && vite build` なので
      # 型チェックとビルドの両方をここで検証する
      - name: Build
        run: pnpm build
